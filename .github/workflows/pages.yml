name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate sitemap
        run: |
          set -eu
          SITE_URL="https://995studio.com"
          {
            printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>'
            printf '%s\n' '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
            find . -path './.git' -prune -o -path './.github' -prune -o -name '*.html' -type f -print |
              sort |
              while IFS= read -r file; do
                path="${file#./}"
                if [ "$path" = "index.html" ]; then
                  url="$SITE_URL/"
                elif [ "${path##*/}" = "index.html" ]; then
                  url="$SITE_URL/${path%index.html}"
                else
                  url="$SITE_URL/$path"
                fi
                printf '  <url><loc>%s</loc></url>\n' "$url"
              done
            printf '%s\n' '</urlset>'
          } > manifest/sitemap.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
