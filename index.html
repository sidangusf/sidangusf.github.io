<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>995 Studio</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100svh;
            padding: max(20px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f8f8;
            color: #222;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                         Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }

        .container {
            width: 100%;
            padding: 40px 20px;
            max-width: 800px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.75rem, 11vw, 4rem);
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.05;
        }

        .subtitle {
            margin-top: 24px;
            font-size: clamp(1.2rem, 4.5vw, 1.6rem);
            color: #666;
            line-height: 1.4;
        }

        .contact {
            margin-top: 20px;
            font-size: clamp(1.05rem, 4vw, 1.4rem);
            color: #555;
        }

        .contact a {
            color: #222;
            text-decoration: none;
            font-weight: 600;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        .manifest-link {
            display: inline-block;
            margin-top: 28px;
            padding: 14px 28px;
            border-radius: 999px;
            background-color: #222;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .manifest-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.16);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }

            .subtitle {
                font-size: 1.25rem;
            }

            .contact {
                font-size: 1.15rem;
            }
        }

        @media (max-width: 480px) {
            body {
                align-items: flex-start;
            }

            .container {
                padding: 56px 0 32px;
            }

            h1 {
                font-size: clamp(2.35rem, 14vw, 3rem);
            }

            .subtitle {
                margin-top: 18px;
            }

            .manifest-link {
                width: 100%;
                max-width: 280px;
                padding: 14px 20px;
            }

            .contact a {
                display: block;
                margin-top: 4px;
                overflow-wrap: anywhere;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>995 Studio</h1>

        <div class="subtitle">
            Building simple, thoughtful, and useful digital experiences.
        </div>

        <a class="manifest-link" href="manifest/">
            Open Manifest
        </a>

        <div class="contact">
            Contact:
            <a href="mailto:support@995studio.com">
                support@995studio.com
            </a>
        </div>
    </div>
    <!-- GitHub Pages deployment refresh. -->
</body>
</html>
