<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>995 Studio</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f8f8;
            color: #222;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                         Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }

        .container {
            padding: 40px 20px;
            max-width: 800px;
        }

        h1 {
            margin: 0;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .subtitle {
            margin-top: 24px;
            font-size: 1.6rem;
            color: #666;
            line-height: 1.4;
        }

        .contact {
            margin-top: 20px;
            font-size: 1.4rem;
            color: #555;
        }

        .contact a {
            color: #222;
            text-decoration: none;
            font-weight: 600;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }

            .subtitle {
                font-size: 1.25rem;
            }

            .contact {
                font-size: 1.15rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>995 Studio</h1>

        <div class="subtitle">
            Building simple, thoughtful, and useful digital experiences.
        </div>

        <div class="contact">
            Contact:
            <a href="mailto:support@995studio.com">
                support@995studio.com
            </a>
        </div>
    </div>
</body>
</html>
